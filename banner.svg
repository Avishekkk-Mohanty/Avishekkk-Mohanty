    <g transform="translate(10, 10)">
      <text x="0" y="0" fill="#30363d" font-family="monospace" font-size="14">Avishekkk-Mohanty / README.md</text>
      
      <g text-anchor="middle" font-family="monospace, serif" font-weight="bold" fill="#424a53">
